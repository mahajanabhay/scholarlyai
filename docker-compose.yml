version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: scholarlyai
      POSTGRES_USER: scholarly_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scholarly_user -d scholarlyai"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./data_backup:/app/data_backup

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run build && npm start"
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    expose:
      - "3000"
    volumes:
      - .:/app
    depends_on:
      - backend

volumes:
  pgdata:

nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend